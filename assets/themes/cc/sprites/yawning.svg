<svg width="360" height="240" viewBox="0 0 360 240"
  xmlns="http://www.w3.org/2000/svg" aria-label="Yawning">
  <defs>
    <filter id="fC" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="fG" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="fB" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="fF" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
    <filter id="fH" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <style>
  .stl{transform-box:fill-box;transform-origin:center bottom;animation:stl 2s ease-in-out infinite}
  .str{transform-box:fill-box;transform-origin:center bottom;animation:str 2s ease-in-out infinite}
  @keyframes stl{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-14px) rotate(-9deg)}}
  @keyframes str{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-14px) rotate(9deg)}}</style>
  <g class="cloud">
  <g filter="url(#fC)">
    <ellipse cx="180" cy="178" rx="128" ry="43" fill="#FF9A59"/>
    <circle cx="64"  cy="152" r="34" fill="#FF9A59"/>
    <circle cx="122" cy="118" r="50" fill="#FF9A59"/>
    <circle cx="173" cy="87"  r="56" fill="#FF9A59"/>
    <circle cx="230" cy="111" r="53" fill="#FFA76C"/>
    <circle cx="293" cy="148" r="37" fill="#FFA76C"/>
  </g>
  <g filter="url(#fG)">
    <ellipse cx="165" cy="96" rx="44" ry="23" fill="#FFCF90" opacity="0.48"/>
  </g>
  <g class="stl" filter="url(#fH)"><circle cx="92" cy="132" r="18" fill="#FFB87A"/></g>
  <g class="str" filter="url(#fH)"><circle cx="268" cy="130" r="18" fill="#FFB87A"/></g>  <ellipse cx="136" cy="161" rx="24" ry="11" fill="#FF6080" opacity="0.35" filter="url(#fB)"/>
  <ellipse cx="224" cy="161" rx="24" ry="11" fill="#FF6080" opacity="0.35" filter="url(#fB)"/>  <g filter="url(#fF)">
    <ellipse cx="150" cy="151" rx="14" ry="7" fill="#1E0A00"/>
    <ellipse cx="147" cy="148" rx="3.5" ry="3" fill="#FFF" opacity="0.82"/>
    <ellipse cx="210" cy="151" rx="14" ry="7" fill="#1E0A00"/>
    <ellipse cx="207" cy="148" rx="3.5" ry="3" fill="#FFF" opacity="0.82"/>
  </g>  <g filter="url(#fF)">
    <ellipse cx="180" cy="174" rx="16" ry="14" fill="#1E0A00"/>
    <ellipse cx="180" cy="172" rx="11" ry="9" fill="#C04040"/>
  </g>
  </g>
</svg>