<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="crispEdges">
  <g id="root">
    <!-- Body -->
    <rect x="28" y="44" width="64" height="28" fill="#CC7850"/>
    <!-- Left arm bump -->
    <rect x="20" y="52" width="8" height="14" fill="#CC7850"/>
    <!-- Right arm bump -->
    <rect x="92" y="52" width="8" height="14" fill="#CC7850"/>
    <!-- Left eye flat line (2px tall) -->
    <rect x="38" y="57" width="12" height="3" fill="#1A0A00"/>
    <!-- Right eye flat line (2px tall) -->
    <rect x="70" y="57" width="12" height="3" fill="#1A0A00"/>
    <!-- Light blush marks -->
    <rect x="28" y="64" width="10" height="6" fill="#E8906A" opacity="0.35"/>
    <rect x="82" y="64" width="10" height="6" fill="#E8906A" opacity="0.35"/>
    <!-- Legs -->
    <rect x="36" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="50" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="60" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="74" y="72" width="10" height="12" fill="#CC7850"/>
    <!-- Floating Z animations -->
    <text x="72" y="38" font-size="14" fill="#8899BB" font-weight="bold" font-family="monospace">Z
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-16" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2s" repeatCount="indefinite"/>
    </text>
    <text x="84" y="24" font-size="11" fill="#8899BB" font-weight="bold" font-family="monospace">Z
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-16" dur="2s" begin="0.67s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2s" begin="0.67s" repeatCount="indefinite"/>
    </text>
    <text x="94" y="12" font-size="8" fill="#8899BB" font-weight="bold" font-family="monospace">Z
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-16" dur="2s" begin="1.33s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="2s" begin="1.33s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
