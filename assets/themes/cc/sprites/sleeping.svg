<svg width="360" height="240" viewBox="0 0 360 240"
  xmlns="http://www.w3.org/2000/svg" aria-label="Sleeping">
  <defs>
    <filter id="fC" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="fG" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="fB" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="fF" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="0.3"/></filter>
    <filter id="fH" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>
  <style>
    /* gentle slow sway */
    .cloud{animation:sway 6s ease-in-out infinite}
    @keyframes sway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(1.5deg)}}

    /* bubbles: translateY only (no scale), white stroke for contrast */
    .bub  { animation: bubble 2.8s ease-out infinite; }
    .bub2 { animation: bubble 2.8s ease-out infinite 0.93s; }
    .bub3 { animation: bubble 2.8s ease-out infinite 1.86s; }

    @keyframes bubble {
      0%   { transform: translateY(0px);   opacity: 0; }
      8%   { opacity: 0.85; }
      75%  { opacity: 0.35; }
      100% { transform: translateY(-70px); opacity: 0; }
    }
  </style>

  <g class="cloud">
    <!-- Cloud body — standard, upright (no rotation) -->
    <g filter="url(#fC)">
      <ellipse cx="180" cy="178" rx="128" ry="43" fill="#FF9A59"/>
      <circle cx="64"  cy="152" r="34" fill="#FF9A59"/>
      <circle cx="122" cy="118" r="50" fill="#FF9A59"/>
      <circle cx="173" cy="87"  r="56" fill="#FF9A59"/>
      <circle cx="230" cy="111" r="53" fill="#FFA76C"/>
      <circle cx="293" cy="148" r="37" fill="#FFA76C"/>
    </g>
    <g filter="url(#fG)">
      <ellipse cx="165" cy="96" rx="44" ry="23" fill="#FFCF90" opacity="0.48"/>
    </g>

    <!-- Sleep bubbles — white ring circles, clearly visible, rising from face -->
    <circle class="bub"  cx="200" cy="155" r="10"
            fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="2.8"/>
    <circle class="bub2" cx="200" cy="155" r="10"
            fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="2.8"/>
    <circle class="bub3" cx="200" cy="155" r="10"
            fill="none" stroke="rgba(255,255,255,0.88)" stroke-width="2.8"/>

    <!-- Hands -->
    <g filter="url(#fH)"><circle cx="105" cy="188" r="18" fill="#FFB87A"/></g>
    <g filter="url(#fH)"><circle cx="255" cy="186" r="18" fill="#FFB87A"/></g>

    <!-- Blush — slightly stronger for cute sleeping look -->
    <ellipse cx="136" cy="161" rx="26" ry="12" fill="#FF6080" opacity="0.42" filter="url(#fB)"/>
    <ellipse cx="224" cy="161" rx="26" ry="12" fill="#FF6080" opacity="0.42" filter="url(#fB)"/>

    <!-- Eyes — sleeping: upward ^ arcs (closed) -->
    <g filter="url(#fF)">
      <path d="M135 150 Q150 138 165 150"
            stroke="#1E0A00" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M195 150 Q210 138 225 150"
            stroke="#1E0A00" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Mouth — tiny open O (mouth slightly parted in sleep) -->
    <g filter="url(#fF)">
      <ellipse cx="180" cy="172" rx="7" ry="5.5" fill="#1E0A00"/>
      <ellipse cx="180" cy="171" rx="4.5" ry="3.2" fill="#CC3838"/>
    </g>
  </g>
</svg>
