<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="crispEdges">
  <g id="root">
    <!-- Code editor window dark bg -->
    <rect x="24" y="6" width="72" height="34" fill="#1E1E2E"/>
    <!-- Title bar -->
    <rect x="24" y="6" width="72" height="8" fill="#333333"/>
    <!-- Title bar dots -->
    <rect x="28" y="8" width="4" height="4" fill="#FF5F56"/>
    <rect x="34" y="8" width="4" height="4" fill="#FFBD2E"/>
    <rect x="40" y="8" width="4" height="4" fill="#27C93F"/>
    <!-- Code lines -->
    <rect x="28" y="18" width="36" height="3" fill="#50FA7B"/>
    <rect x="28" y="24" width="48" height="3" fill="#8BE9FD"/>
    <rect x="28" y="30" width="28" height="3" fill="#F1FA8C"/>
    <!-- Body -->
    <rect x="28" y="44" width="64" height="28" fill="#CC7850"/>
    <!-- Left arm bump -->
    <rect x="20" y="52" width="8" height="14" fill="#CC7850"/>
    <!-- Right arm bump -->
    <rect x="92" y="52" width="8" height="14" fill="#CC7850"/>
    <!-- Left eye -->
    <rect x="38" y="52" width="12" height="12" fill="#1A0A00"/>
    <!-- Right eye -->
    <rect x="70" y="52" width="12" height="12" fill="#1A0A00"/>
    <!-- Left pair legs (animated) -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="0.35s" repeatCount="indefinite"/>
      <rect x="36" y="72" width="10" height="12" fill="#CC7850"/>
      <rect x="50" y="72" width="10" height="12" fill="#CC7850"/>
    </g>
    <!-- Right pair legs (opposite phase) -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,-4;0,0;0,-4" dur="0.35s" repeatCount="indefinite"/>
      <rect x="60" y="72" width="10" height="12" fill="#CC7850"/>
      <rect x="74" y="72" width="10" height="12" fill="#CC7850"/>
    </g>
    <!-- Keyboard -->
    <rect x="28" y="88" width="64" height="12" fill="#888888"/>
    <rect x="30" y="90" width="8" height="4" fill="#AAAAAA"/>
    <rect x="40" y="90" width="8" height="4" fill="#AAAAAA"/>
    <rect x="50" y="90" width="8" height="4" fill="#AAAAAA"/>
    <rect x="60" y="90" width="8" height="4" fill="#AAAAAA"/>
    <rect x="70" y="90" width="8" height="4" fill="#AAAAAA"/>
    <rect x="80" y="90" width="8" height="4" fill="#AAAAAA"/>
    <rect x="34" y="95" width="52" height="3" fill="#AAAAAA"/>
  </g>
</svg>
