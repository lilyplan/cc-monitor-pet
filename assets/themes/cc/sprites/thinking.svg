<svg width="360" height="240" viewBox="0 0 360 240"
  xmlns="http://www.w3.org/2000/svg" aria-label="Thinking">
  <defs>
    <filter id="fC" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="fG" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="fB" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="fF" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
    <filter id="fH" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <style>
  .cloud{animation:float 3.8s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .eye-l,.eye-r{transform-box:fill-box;transform-origin:center;animation:blink 5.2s ease-in-out infinite}
  @keyframes blink{0%,82%,100%{transform:scaleY(1)}88%{transform:scaleY(.06)}93%{transform:scaleY(1)}}
  .tdot{animation:tdot 1.8s ease-in-out infinite}
  .tdot:nth-child(2){animation-delay:.4s}
  .tdot:nth-child(3){animation-delay:.8s}
  @keyframes tdot{0%,100%{opacity:.2;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}</style>
  <g class="cloud">
  <g filter="url(#fC)">
    <ellipse cx="180" cy="178" rx="128" ry="43" fill="#FF9A59"/>
    <circle cx="64"  cy="152" r="34" fill="#FF9A59"/>
    <circle cx="122" cy="118" r="50" fill="#FF9A59"/>
    <circle cx="173" cy="87"  r="56" fill="#FF9A59"/>
    <circle cx="230" cy="111" r="53" fill="#FFA76C"/>
    <circle cx="293" cy="148" r="37" fill="#FFA76C"/>
  </g>
  <g filter="url(#fG)">
    <ellipse cx="165" cy="96" rx="44" ry="23" fill="#FFCF90" opacity="0.48"/>
  </g>
  <g filter="url(#fH)"><circle cx="105" cy="188" r="18" fill="#FFB87A"/></g>
  <g filter="url(#fH)"><circle cx="198" cy="163" r="16" fill="#FFB87A"/></g>  <ellipse cx="136" cy="161" rx="24" ry="11" fill="#FF6080" opacity="0.35" filter="url(#fB)"/>
  <ellipse cx="224" cy="161" rx="24" ry="11" fill="#FF6080" opacity="0.35" filter="url(#fB)"/>  <g class="tdot"><circle cx="238" cy="108" r="5" fill="#1E0A00"/></g>
  <g class="tdot"><circle cx="254" cy="92"  r="7" fill="#1E0A00" opacity="0.6"/></g>
  <g class="tdot"><circle cx="274" cy="73"  r="10" fill="#1E0A00" opacity="0.35"/></g>  <g filter="url(#fF)">
    <ellipse cx="150" cy="145" rx="14" ry="16" fill="#1E0A00"/>
    <ellipse cx="147" cy="136" rx="4.5" ry="5.5" fill="#FFF" opacity="0.92"/>
    <ellipse cx="210" cy="145" rx="14" ry="16" fill="#1E0A00"/>
    <ellipse cx="207" cy="136" rx="4.5" ry="5.5" fill="#FFF" opacity="0.92"/>
  </g>  <g filter="url(#fF)">
    <path d="M 170 173 Q 180 169 190 173" stroke="#1E0A00" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  </g>
  </g>
</svg>