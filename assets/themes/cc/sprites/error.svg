<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="crispEdges">
  <g id="root">
    <animateTransform attributeName="transform" type="translate" values="-3,0;3,0;0,0" dur="0.3s" repeatCount="indefinite"/>
    <!-- ERROR text above -->
    <text x="22" y="26" font-size="14" fill="#CC2222" font-family="monospace" font-weight="bold">ERROR</text>
    <!-- Body -->
    <rect x="28" y="44" width="64" height="28" fill="#CC7850"/>
    <!-- Left arm bump -->
    <rect x="20" y="52" width="8" height="14" fill="#CC7850"/>
    <!-- Right arm bump -->
    <rect x="92" y="52" width="8" height="14" fill="#CC7850"/>
    <!-- Left eye X (4 rects forming X) -->
    <rect x="38" y="52" width="4" height="4" fill="#CC2222"/>
    <rect x="46" y="52" width="4" height="4" fill="#CC2222"/>
    <rect x="42" y="56" width="4" height="4" fill="#CC2222"/>
    <rect x="38" y="60" width="4" height="4" fill="#CC2222"/>
    <rect x="46" y="60" width="4" height="4" fill="#CC2222"/>
    <!-- Right eye X (4 rects forming X) -->
    <rect x="70" y="52" width="4" height="4" fill="#CC2222"/>
    <rect x="78" y="52" width="4" height="4" fill="#CC2222"/>
    <rect x="74" y="56" width="4" height="4" fill="#CC2222"/>
    <rect x="70" y="60" width="4" height="4" fill="#CC2222"/>
    <rect x="78" y="60" width="4" height="4" fill="#CC2222"/>
    <!-- Legs -->
    <rect x="36" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="50" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="60" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="74" y="72" width="10" height="12" fill="#CC7850"/>
  </g>
</svg>
