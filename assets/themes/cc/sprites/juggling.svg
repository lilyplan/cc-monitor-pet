<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="crispEdges">
  <g id="root">
    <!-- Body -->
    <rect x="28" y="44" width="64" height="28" fill="#CC7850"/>
    <!-- Left arm bump (raised) -->
    <rect x="20" y="46" width="8" height="14" fill="#CC7850"/>
    <!-- Right arm bump (raised) -->
    <rect x="92" y="46" width="8" height="14" fill="#CC7850"/>
    <!-- Left eye -->
    <rect x="38" y="52" width="12" height="12" fill="#1A0A00"/>
    <!-- Right eye -->
    <rect x="70" y="52" width="12" height="12" fill="#1A0A00"/>
    <!-- Legs -->
    <rect x="36" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="50" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="60" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="74" y="72" width="10" height="12" fill="#CC7850"/>
    <!-- Ball 1 (red) -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="0.8s" repeatCount="indefinite"/>
      <rect x="30" y="16" width="10" height="10" fill="#E85555"/>
    </g>
    <!-- Ball 2 (green) -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="0.8s" begin="0.27s" repeatCount="indefinite"/>
      <rect x="55" y="8" width="10" height="10" fill="#55B855"/>
    </g>
    <!-- Ball 3 (blue) -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-8;0,0" dur="0.8s" begin="0.54s" repeatCount="indefinite"/>
      <rect x="80" y="16" width="10" height="10" fill="#5588E8"/>
    </g>
  </g>
</svg>
