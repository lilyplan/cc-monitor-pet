<svg width="360" height="240" viewBox="0 0 360 240"
  xmlns="http://www.w3.org/2000/svg" aria-label="Juggling">
  <defs>
    <filter id="fC" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="fG" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="fB" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="fF" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
    <filter id="fH" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <style>
  .cloud{animation:float 3.8s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .eye-l,.eye-r{transform-box:fill-box;transform-origin:center;animation:blink 5.2s ease-in-out infinite}
  @keyframes blink{0%,82%,100%{transform:scaleY(1)}88%{transform:scaleY(.06)}93%{transform:scaleY(1)}}
  .ba{transform-box:fill-box;transform-origin:center;animation:ba 1.2s ease-in-out infinite}
  .bb{transform-box:fill-box;transform-origin:center;animation:bb 1.2s ease-in-out infinite .4s}
  .bc{transform-box:fill-box;transform-origin:center;animation:bc 1.2s ease-in-out infinite .8s}
  .hjl{transform-box:fill-box;transform-origin:center;animation:hjl 1.2s ease-in-out infinite}
  .hjr{transform-box:fill-box;transform-origin:center;animation:hjr 1.2s ease-in-out infinite .6s}
  @keyframes ba{0%,100%{transform:translate(0,0)}50%{transform:translate(52px,-58px)}}
  @keyframes bb{0%,100%{transform:translate(0,0)}50%{transform:translate(-44px,-62px)}}
  @keyframes bc{0%,100%{transform:translate(0,0)}50%{transform:translate(10px,-68px)}}
  @keyframes hjl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes hjr{0%,100%{transform:translateY(-10px)}50%{transform:translateY(0)}}</style>
  <g class="cloud">
  <g filter="url(#fC)">
    <ellipse cx="180" cy="178" rx="128" ry="43" fill="#FF9A59"/>
    <circle cx="64"  cy="152" r="34" fill="#FF9A59"/>
    <circle cx="122" cy="118" r="50" fill="#FF9A59"/>
    <circle cx="173" cy="87"  r="56" fill="#FF9A59"/>
    <circle cx="230" cy="111" r="53" fill="#FFA76C"/>
    <circle cx="293" cy="148" r="37" fill="#FFA76C"/>
  </g>
  <g filter="url(#fG)">
    <ellipse cx="165" cy="96" rx="44" ry="23" fill="#FFCF90" opacity="0.48"/>
  </g>
  <g class="hjl" filter="url(#fH)"><circle cx="90" cy="152" r="18" fill="#FFB87A"/></g>
  <g class="hjr" filter="url(#fH)"><circle cx="270" cy="150" r="18" fill="#FFB87A"/></g>  <g class="ba"><circle cx="90" cy="152" r="10" fill="#FF6BAE" opacity="0.9"/></g>
  <g class="bb"><circle cx="270" cy="150" r="10" fill="#6BC5FF" opacity="0.9"/></g>
  <g class="bc"><circle cx="180" cy="128" r="10" fill="#90E070" opacity="0.9"/></g>  <ellipse cx="136" cy="161" rx="24" ry="11" fill="#FF6080" opacity="0.35" filter="url(#fB)"/>
  <ellipse cx="224" cy="161" rx="24" ry="11" fill="#FF6080" opacity="0.35" filter="url(#fB)"/>  <g filter="url(#fF)">
    <ellipse cx="150" cy="145" rx="16" ry="19" fill="#1E0A00"/>
    <ellipse cx="144" cy="138" rx="5.5" ry="6.5" fill="#FFF" opacity="0.95"/>
    <ellipse cx="210" cy="145" rx="16" ry="19" fill="#1E0A00"/>
    <ellipse cx="204" cy="138" rx="5.5" ry="6.5" fill="#FFF" opacity="0.95"/>
  </g>  <g filter="url(#fF)">
    <path d="M 162 166 Q 180 182 198 166" stroke="#1E0A00" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  </g>
  </g>
</svg>