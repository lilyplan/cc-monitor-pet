<svg width="360" height="240" viewBox="0 0 360 240"
  xmlns="http://www.w3.org/2000/svg" aria-label="Attention">
  <defs>
    <filter id="fC" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="fG" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="fB" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="fF" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
    <filter id="fH" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <style>
  .cloud{animation:float 3.8s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
  .eye-l,.eye-r{transform-box:fill-box;transform-origin:center;animation:blink 5.2s ease-in-out infinite}
  @keyframes blink{0%,82%,100%{transform:scaleY(1)}88%{transform:scaleY(.06)}93%{transform:scaleY(1)}}
  .sp{transform-box:fill-box;transform-origin:center;animation:sp 1.6s ease-in-out infinite}
  .sp:nth-child(2){animation-delay:.32s}
  .sp:nth-child(3){animation-delay:.64s}
  .sp:nth-child(4){animation-delay:.96s}
  .sp:nth-child(5){animation-delay:1.28s}
  @keyframes sp{0%,100%{opacity:0;transform:scale(0) rotate(0deg)}45%{opacity:1;transform:scale(1) rotate(20deg)}}
  .hand-l{transform-box:fill-box;transform-origin:center top;animation:wvL 3.2s ease-in-out infinite}
  .hand-r{transform-box:fill-box;transform-origin:center top;animation:wvR 3.2s ease-in-out infinite}
  @keyframes wvL{0%,100%{transform:rotate(0)}40%{transform:rotate(-7deg) translateY(-2px)}70%{transform:rotate(3deg) translateY(1px)}}
  @keyframes wvR{0%,100%{transform:rotate(0)}35%{transform:rotate(7deg) translateY(-2px)}65%{transform:rotate(-3deg) translateY(1px)}}</style>
  <g class="cloud">
  <g filter="url(#fC)">
    <ellipse cx="180" cy="178" rx="128" ry="43" fill="#FF9A59"/>
    <circle cx="64"  cy="152" r="34" fill="#FF9A59"/>
    <circle cx="122" cy="118" r="50" fill="#FF9A59"/>
    <circle cx="173" cy="87"  r="56" fill="#FF9A59"/>
    <circle cx="230" cy="111" r="53" fill="#FFA76C"/>
    <circle cx="293" cy="148" r="37" fill="#FFA76C"/>
  </g>
  <g filter="url(#fG)">
    <ellipse cx="165" cy="96" rx="44" ry="23" fill="#FFCF90" opacity="0.48"/>
  </g>
  <g class="hand-l" filter="url(#fH)"><circle cx="105" cy="188" r="18" fill="#FFB87A"/></g>
  <g class="hand-r" filter="url(#fH)"><circle cx="255" cy="186" r="18" fill="#FFB87A"/></g>  <g class="sp"><text x="50"  y="82"  font-size="16" fill="#FFD700" font-family="Arial">✦</text></g>
  <g class="sp"><text x="274" y="76"  font-size="13" fill="#FFD700" font-family="Arial">✦</text></g>
  <g class="sp"><text x="308" y="108" font-size="11" fill="#FFD700" font-family="Arial">✦</text></g>
  <g class="sp"><text x="36"  y="116" font-size="11" fill="#FFD700" font-family="Arial">✦</text></g>
  <g class="sp"><text x="176" y="50"  font-size="18" fill="#FFD700" font-family="Arial">✦</text></g>  <ellipse cx="136" cy="161" rx="24" ry="11" fill="#FF6080" opacity="0.35" filter="url(#fB)"/>
  <ellipse cx="224" cy="161" rx="24" ry="11" fill="#FF6080" opacity="0.35" filter="url(#fB)"/>  <g filter="url(#fF)">
    <path d="M 136 150 Q 150 135 164 150" stroke="#1E0A00" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 196 150 Q 210 135 224 150" stroke="#1E0A00" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>  <g filter="url(#fF)">
    <path d="M 162 166 Q 180 182 198 166" stroke="#1E0A00" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  </g>
  </g>
</svg>