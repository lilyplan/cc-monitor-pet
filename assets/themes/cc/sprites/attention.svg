<svg width="360" height="240" viewBox="0 0 360 240"
  xmlns="http://www.w3.org/2000/svg" aria-label="Attention">
  <defs>
    <filter id="fC" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="fG" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="fB" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="fF" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="0.3"/></filter>
    <filter id="fH" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1.5"/></filter>
    <filter id="fEx" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
  .cloud{
    transform-box: fill-box; transform-origin: center;
    animation: attn-bob 0.9s ease-in-out infinite alternate;
  }
  @keyframes attn-bob{
    0%  { transform: translateY(0)   rotate(-2deg) }
    100%{ transform: translateY(-10px) rotate(2deg) }
  }
  .excl{
    transform-box: fill-box; transform-origin: center bottom;
    animation: excl-pop 0.9s ease-in-out infinite alternate;
  }
  @keyframes excl-pop{
    0%  { transform: scale(1)    translateY(0) }
    100%{ transform: scale(1.15) translateY(-8px) }
  }
  .eye-l,.eye-r{
    transform-box:fill-box; transform-origin:center;
    animation: blink 5.2s ease-in-out infinite;
  }
  @keyframes blink{0%,82%,100%{transform:scaleY(1)}88%{transform:scaleY(.06)}93%{transform:scaleY(1)}}
  .hand-l{transform-box:fill-box;transform-origin:50% 90%;animation:hL 0.9s ease-in-out infinite alternate}
  .hand-r{transform-box:fill-box;transform-origin:50% 90%;animation:hR 0.9s ease-in-out infinite alternate}
  @keyframes hL{0%{transform:rotate(-5deg)}100%{transform:rotate(-18deg) translateY(-6px)}}
  @keyframes hR{0%{transform:rotate(5deg)} 100%{transform:rotate(18deg)  translateY(-6px)}}
  </style>

  <!-- ── 느낌표 (구름 위, 독립 팝 애니) ── -->
  <g class="excl" filter="url(#fEx)">
    <!-- 글로우 -->
    <rect x="168" y="6"  width="24" height="54" rx="12" fill="#FFE000" opacity="0.30"/>
    <circle cx="180" cy="72" r="10" fill="#FFE000" opacity="0.30"/>
    <!-- 느낌표 본체 -->
    <rect x="172" y="8"  width="16" height="48" rx="8" fill="#FFE515" stroke="#FFA500" stroke-width="1.2"/>
    <!-- 점 -->
    <circle cx="180" cy="68" r="9" fill="#FFE515" stroke="#FFA500" stroke-width="1.2"/>
    <!-- 하이라이트 -->
    <rect x="175" y="12" width="6"  height="22" rx="3" fill="#FFFDE0" opacity="0.65"/>
  </g>

  <!-- ── 구름 ── -->
  <g class="cloud">
    <g filter="url(#fC)">
      <ellipse cx="180" cy="178" rx="128" ry="43" fill="#FF9A59"/>
      <circle  cx="64"  cy="152" r="34"          fill="#FF9A59"/>
      <circle  cx="122" cy="118" r="50"          fill="#FF9A59"/>
      <circle  cx="173" cy="87"  r="56"          fill="#FF9A59"/>
      <circle  cx="230" cy="111" r="53"          fill="#FFA76C"/>
      <circle  cx="293" cy="148" r="37"          fill="#FFA76C"/>
    </g>
    <g filter="url(#fG)">
      <ellipse cx="165" cy="96" rx="44" ry="23" fill="#FFCF90" opacity="0.48"/>
    </g>

    <g class="hand-l" filter="url(#fH)"><circle cx="52"  cy="82" r="20" fill="#FFB87A"/></g>
    <g class="hand-r" filter="url(#fH)"><circle cx="308" cy="82" r="20" fill="#FFB87A"/></g>

    <ellipse cx="136" cy="161" rx="26" ry="12" fill="#FF6080" opacity="0.40" filter="url(#fB)"/>
    <ellipse cx="224" cy="161" rx="26" ry="12" fill="#FF6080" opacity="0.40" filter="url(#fB)"/>

    <!-- 눈: 놀라서 크게 뜸 -->
    <g class="eye-l" filter="url(#fF)"><g>
      <ellipse cx="150" cy="145" rx="16" ry="18" fill="#1E0A00"/>
      <ellipse cx="144" cy="137" rx="5.5" ry="6.5" fill="#FFF" opacity="0.95"/>
    </g></g>
    <g class="eye-r" filter="url(#fF)"><g>
      <ellipse cx="210" cy="145" rx="16" ry="18" fill="#1E0A00"/>
      <ellipse cx="204" cy="137" rx="5.5" ry="6.5" fill="#FFF" opacity="0.95"/>
    </g></g>

    <!-- 입: 살짝 벌림 (놀람) -->
    <g filter="url(#fF)">
      <ellipse cx="180" cy="172" rx="10" ry="8" fill="#1E0A00"/>
      <ellipse cx="180" cy="172" rx="7"  ry="5.5" fill="#B03020"/>
    </g>
  </g>
</svg>
