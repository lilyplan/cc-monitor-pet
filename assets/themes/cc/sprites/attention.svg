<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="crispEdges">
  <g id="root">
    <!-- Body -->
    <rect x="28" y="44" width="64" height="28" fill="#CC7850"/>
    <!-- Left arm bump -->
    <rect x="20" y="52" width="8" height="14" fill="#CC7850"/>
    <!-- Right arm bump -->
    <rect x="92" y="52" width="8" height="14" fill="#CC7850"/>
    <!-- Left eye -->
    <rect x="38" y="52" width="12" height="12" fill="#1A0A00"/>
    <!-- Right eye -->
    <rect x="70" y="52" width="12" height="12" fill="#1A0A00"/>
    <!-- Legs -->
    <rect x="36" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="50" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="60" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="74" y="72" width="10" height="12" fill="#CC7850"/>
    <!-- Sparkle 1 -->
    <rect x="18" y="20" width="6" height="6" fill="#FFD700">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <!-- Sparkle 2 -->
    <rect x="96" y="18" width="6" height="6" fill="#FF6688">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" begin="0.2s" repeatCount="indefinite"/>
    </rect>
    <!-- Sparkle 3 -->
    <rect x="10" y="50" width="5" height="5" fill="#55CCFF">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" begin="0.4s" repeatCount="indefinite"/>
    </rect>
    <!-- Sparkle 4 -->
    <rect x="105" y="44" width="5" height="5" fill="#88FF44">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
    </rect>
    <!-- Sparkle 5 -->
    <rect x="30" y="14" width="4" height="4" fill="#FF8844">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" begin="0.8s" repeatCount="indefinite"/>
    </rect>
    <!-- Sparkle 6 -->
    <rect x="86" y="10" width="4" height="4" fill="#CC44FF">
      <animate attributeName="opacity" values="1;0;1" dur="1.2s" begin="1.0s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
