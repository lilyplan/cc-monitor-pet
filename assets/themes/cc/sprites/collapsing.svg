<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" shape-rendering="crispEdges">
  <g id="root" transform="rotate(-25,60,70)">
    <!-- Body -->
    <rect x="28" y="44" width="64" height="28" fill="#CC7850"/>
    <!-- Left arm bump -->
    <rect x="20" y="52" width="8" height="14" fill="#CC7850"/>
    <!-- Right arm bump -->
    <rect x="92" y="52" width="8" height="14" fill="#CC7850"/>
    <!-- Left eye: spiral/dizzy concentric rings -->
    <circle cx="44" cy="58" r="8" fill="#FFFEF0"/>
    <circle cx="44" cy="58" r="5" fill="none" stroke="#1A0A00" stroke-width="2"/>
    <circle cx="44" cy="58" r="2" fill="#1A0A00"/>
    <!-- Right eye: spiral/dizzy concentric rings -->
    <circle cx="76" cy="58" r="8" fill="#FFFEF0"/>
    <circle cx="76" cy="58" r="5" fill="none" stroke="#1A0A00" stroke-width="2"/>
    <circle cx="76" cy="58" r="2" fill="#1A0A00"/>
    <!-- Legs -->
    <rect x="36" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="50" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="60" y="72" width="10" height="12" fill="#CC7850"/>
    <rect x="74" y="72" width="10" height="12" fill="#CC7850"/>
    <!-- Wavy mouth -->
    <path d="M 44 68 Q 48 64 52 68 Q 56 72 60 68 Q 64 64 68 68 Q 72 72 76 68" stroke="#1A0A00" stroke-width="2" fill="none"/>
  </g>
</svg>
