<svg width="360" height="240" viewBox="0 0 360 240"
  xmlns="http://www.w3.org/2000/svg" aria-label="Sweeping">
  <defs>
    <filter id="fC" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <filter id="fG" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="fB" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="fF" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.3"/>
    </filter>
    <filter id="fH" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>
  <style>
  .eye-l,.eye-r{transform-box:fill-box;transform-origin:center;animation:blink 5.2s ease-in-out infinite}
  @keyframes blink{0%,82%,100%{transform:scaleY(1)}88%{transform:scaleY(.06)}93%{transform:scaleY(1)}}
  .cloud{animation:sway 1.6s ease-in-out infinite}
  .swarm{transform-box:fill-box;transform-origin:120px 188px;animation:swarm 1.6s ease-in-out infinite}
  @keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  @keyframes swarm{0%,100%{transform:rotate(-15deg)}50%{transform:rotate(15deg)}}</style>
  <g class="cloud">
  <g filter="url(#fC)">
    <ellipse cx="180" cy="178" rx="128" ry="43" fill="#FF9A59"/>
    <circle cx="64"  cy="152" r="34" fill="#FF9A59"/>
    <circle cx="122" cy="118" r="50" fill="#FF9A59"/>
    <circle cx="173" cy="87"  r="56" fill="#FF9A59"/>
    <circle cx="230" cy="111" r="53" fill="#FFA76C"/>
    <circle cx="293" cy="148" r="37" fill="#FFA76C"/>
  </g>
  <g filter="url(#fG)">
    <ellipse cx="165" cy="96" rx="44" ry="23" fill="#FFCF90" opacity="0.48"/>
  </g>
  <g class="swarm" filter="url(#fH)">
    <circle cx="105" cy="188" r="18" fill="#FFB87A"/>
    <circle cx="148" cy="202" r="16" fill="#FFB87A"/>
  </g>  <g class="swarm" filter="url(#fH)">
    <line x1="128" y1="196" x2="62" y2="218" stroke="#FFB87A" stroke-width="5" stroke-linecap="round"/>
    <ellipse cx="54" cy="221" rx="18" ry="6" fill="#FFB87A" opacity="0.75"/>
  </g>  <ellipse cx="136" cy="161" rx="24" ry="11" fill="#FF6080" opacity="0.35" filter="url(#fB)"/>
  <ellipse cx="224" cy="161" rx="24" ry="11" fill="#FF6080" opacity="0.35" filter="url(#fB)"/>  <g class="eye-l" filter="url(#fF)"><g>
    <ellipse cx="150" cy="145" rx="14" ry="11" fill="#1E0A00"/>
    <ellipse cx="146" cy="141" rx="4" ry="4" fill="#FFF" opacity="0.90"/>
  </g></g>
  <g class="eye-r" filter="url(#fF)"><g>
    <ellipse cx="210" cy="145" rx="14" ry="11" fill="#1E0A00"/>
    <ellipse cx="206" cy="141" rx="4" ry="4" fill="#FFF" opacity="0.90"/>
  </g></g>  <g filter="url(#fF)">
    <line x1="170" y1="171" x2="190" y2="171" stroke="#1E0A00" stroke-width="2.4" stroke-linecap="round"/>
  </g>
  </g>
</svg>