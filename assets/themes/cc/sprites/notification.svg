<svg width="360" height="240" viewBox="0 0 360 240"
  xmlns="http://www.w3.org/2000/svg" aria-label="Notification">
  <defs>
    <filter id="fC" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="fG" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="fB" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="fF" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="0.3"/></filter>
    <filter id="fH" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1.5"/></filter>
    <!-- Bolt glow: blurred copy behind -->
    <filter id="fBoltGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .cloud{animation:j5 3s ease forwards 1}
    @keyframes j5{
      0%{transform:translateY(0)}
      6%{transform:translateY(-22px)} 12%{transform:translateY(0)}
      18%{transform:translateY(-22px)} 24%{transform:translateY(0)}
      30%{transform:translateY(-22px)} 36%{transform:translateY(0)}
      42%{transform:translateY(-22px)} 48%{transform:translateY(0)}
      54%{transform:translateY(-22px)} 60%,100%{transform:translateY(0)}
    }
    /* lightning: float up/down + brightness pulse */
    .bolt{animation:boltFloat 1.4s ease-in-out infinite}
    @keyframes boltFloat{
      0%,100%{transform:translateY(0);opacity:1}
      45%{transform:translateY(-12px);opacity:0.85}
      70%{transform:translateY(-6px);opacity:1}
    }
  </style>

  <g class="cloud">
    <!-- Cloud — reddish orange -->
    <g filter="url(#fC)">
      <ellipse cx="180" cy="178" rx="128" ry="43" fill="#FF6A38"/>
      <circle cx="64"  cy="152" r="34" fill="#FF6A38"/>
      <circle cx="122" cy="118" r="50" fill="#FF6A38"/>
      <circle cx="173" cy="87"  r="56" fill="#FF6A38"/>
      <circle cx="230" cy="111" r="53" fill="#FF7D4E"/>
      <circle cx="293" cy="148" r="37" fill="#FF7D4E"/>
    </g>
    <g filter="url(#fG)">
      <ellipse cx="165" cy="96" rx="44" ry="23" fill="#FFBB90" opacity="0.50"/>
    </g>

    <!-- Lightning bolt — large, centered-right, with strong glow -->
    <g class="bolt">
      <!-- Outer glow layer -->
      <polygon points="284,18 267,56 280,56 260,98 306,48 292,48"
               fill="#FFD700" opacity="0.35" filter="url(#fBoltGlow)"/>
      <!-- Main bolt body -->
      <polygon points="284,18 267,56 280,56 260,98 306,48 292,48"
               fill="#FFE515" stroke="#FFA500" stroke-width="1.5" stroke-linejoin="round"/>
      <!-- Inner bright highlight -->
      <polygon points="281,28 269,53 279,53 263,88 298,50 288,50"
               fill="#FFFDE0" opacity="0.60"/>
    </g>

    <!-- Hands -->
    <g filter="url(#fH)"><circle cx="105" cy="188" r="18" fill="#FF9060"/></g>
    <g filter="url(#fH)"><circle cx="255" cy="186" r="18" fill="#FF9060"/></g>

    <!-- Blush — more intense for shocked look -->
    <ellipse cx="136" cy="161" rx="26" ry="12" fill="#FF1840" opacity="0.42" filter="url(#fB)"/>
    <ellipse cx="224" cy="161" rx="26" ry="12" fill="#FF1840" opacity="0.42" filter="url(#fB)"/>

    <!-- Eyes — wide/shocked (very large irises, large highlights) -->
    <g filter="url(#fF)">
      <ellipse cx="150" cy="145" rx="17" ry="20" fill="#1E0A00"/>
      <ellipse cx="143" cy="137" rx="6.5" ry="7.5" fill="#FFFFFF" opacity="0.96"/>
      <ellipse cx="210" cy="145" rx="17" ry="20" fill="#1E0A00"/>
      <ellipse cx="203" cy="137" rx="6.5" ry="7.5" fill="#FFFFFF" opacity="0.96"/>
    </g>

    <!-- Mouth — shocked O -->
    <g filter="url(#fF)">
      <ellipse cx="180" cy="174" rx="11" ry="13" fill="#1E0A00"/>
      <ellipse cx="180" cy="173" rx="7.5" ry="9" fill="#C03030"/>
    </g>
  </g>
</svg>
