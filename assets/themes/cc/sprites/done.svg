<svg width="360" height="240" viewBox="0 0 360 240"
  xmlns="http://www.w3.org/2000/svg" aria-label="Done">
  <defs>
    <filter id="fC" x="-15%" y="-15%" width="130%" height="130%"><feGaussianBlur stdDeviation="3"/></filter>
    <filter id="fG" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="5"/></filter>
    <filter id="fB" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="fF" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="0.3"/></filter>
    <filter id="fH" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1.5"/></filter>
    <filter id="fCk" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
  .cloud{
    transform-box: fill-box;
    transform-origin: center;
    animation: done-pulse 2.4s ease-in-out infinite;
  }
  @keyframes done-pulse{
    0%,100%{ transform: scale(1)    translateY(0)   }
    30%    { transform: scale(0.87) translateY(7px) }
    65%    { transform: scale(1.05) translateY(-4px)}
    85%    { transform: scale(0.98) translateY(1px) }
  }
  .eye-l,.eye-r{
    transform-box: fill-box; transform-origin: center;
    animation: blink 5.2s ease-in-out infinite;
  }
  @keyframes blink{0%,82%,100%{transform:scaleY(1)}88%{transform:scaleY(.06)}93%{transform:scaleY(1)}}
  /* 손: 오른손은 체크마크를 들고, 왼손은 만세 */
  .hand-l{transform-box:fill-box;transform-origin:50% 90%;animation:bnzL 2.4s ease-in-out infinite}
  .hand-r{transform-box:fill-box;transform-origin:50% 90%;animation:bnzR 2.4s ease-in-out infinite}
  @keyframes bnzL{
    0%,100%{ transform: rotate(-15deg) translateY(0)   }
    30%    { transform: rotate(-22deg) translateY(-5px) }
    65%    { transform: rotate(-10deg) translateY(3px)  }
  }
  @keyframes bnzR{
    0%,100%{ transform: rotate(15deg)  translateY(0)   }
    30%    { transform: rotate(22deg)  translateY(-5px) }
    65%    { transform: rotate(10deg)  translateY(3px)  }
  }
  </style>

  <!-- ── 구름 (손 포함) ── -->
  <g class="cloud">
    <g filter="url(#fC)">
      <ellipse cx="180" cy="178" rx="128" ry="43" fill="#FF9A59"/>
      <circle  cx="64"  cy="152" r="34"          fill="#FF9A59"/>
      <circle  cx="122" cy="118" r="50"          fill="#FF9A59"/>
      <circle  cx="173" cy="87"  r="56"          fill="#FF9A59"/>
      <circle  cx="230" cy="111" r="53"          fill="#FFA76C"/>
      <circle  cx="293" cy="148" r="37"          fill="#FFA76C"/>
    </g>
    <g filter="url(#fG)">
      <ellipse cx="165" cy="96" rx="44" ry="23" fill="#FFCF90" opacity="0.48"/>
    </g>

    <!-- 왼손: 만세 -->
    <g class="hand-l" filter="url(#fH)"><circle cx="52"  cy="82" r="20" fill="#FFB87A"/></g>

    <!-- 오른손: 만세 -->
    <g class="hand-r" filter="url(#fH)"><circle cx="308" cy="82" r="20" fill="#FFB87A"/></g>

    <!-- 체크마크: 오른손 위 (구름과 함께 호흡, 손 흔들림 독립) -->
    <g filter="url(#fCk)">
      <circle cx="312" cy="46" r="36" fill="#FFFFFF" opacity="0.18"/>
      <path d="M 282 50 L 299 70 L 348 24"
            stroke="#FFD090" stroke-width="20"
            fill="none" stroke-linecap="round" stroke-linejoin="round"
            opacity="0.52"/>
      <path d="M 282 50 L 299 70 L 348 24"
            stroke="#FFFFFF" stroke-width="14"
            fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <ellipse cx="136" cy="161" rx="24" ry="11" fill="#FF6080" opacity="0.35" filter="url(#fB)"/>
    <ellipse cx="224" cy="161" rx="24" ry="11" fill="#FF6080" opacity="0.35" filter="url(#fB)"/>

    <g class="eye-l" filter="url(#fF)"><g>
      <ellipse cx="150" cy="145" rx="14" ry="16" fill="#1E0A00"/>
      <ellipse cx="145" cy="139" rx="4.5" ry="5.5" fill="#FFF" opacity="0.92"/>
    </g></g>
    <g class="eye-r" filter="url(#fF)"><g>
      <ellipse cx="210" cy="145" rx="14" ry="16" fill="#1E0A00"/>
      <ellipse cx="205" cy="139" rx="4.5" ry="5.5" fill="#FFF" opacity="0.92"/>
    </g></g>

    <g filter="url(#fF)">
      <path d="M 168 168 Q 180 178 192 168"
            stroke="#1E0A00" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
