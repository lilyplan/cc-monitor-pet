<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'self';" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; background: transparent; }

    html, body {
      width: 112px;
      height: 112px;
      background: transparent !important;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }

    #pet-container {
      width: 112px;
      height: 112px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      position: relative;
    }

    /* 채널 A: 아이 트래킹 전용 */
    #ch-follow {
      width: 96px;
      height: 96px;
      position: absolute;
      bottom: 0;
      display: none;
      border: none;
      background: transparent;
      transition: opacity 0.2s ease;
    }

    /* 채널 B: 일반 SVG innerHTML */
    #ch-sprite {
      width: 96px;
      height: 96px;
      position: absolute;
      bottom: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transition: opacity 0.2s ease;
    }
    #ch-sprite svg { width: 96px; height: 96px; }

    /* 투명 우클릭 오버레이 */
    #hit-area {
      position: absolute;
      inset: 0;
      width: 112px;
      height: 112px;
      background: transparent;
      -webkit-app-region: no-drag;
      z-index: 100;
      cursor: default;
    }
  </style>
</head>
<body>
  <div id="pet-container">
    <object id="ch-follow" type="image/svg+xml" data=""></object>
    <div id="ch-sprite"></div>
    <div id="hit-area"></div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
