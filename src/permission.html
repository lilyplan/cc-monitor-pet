<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 280px;
      height: 62px;
      background: transparent;
      overflow: hidden;
      user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
    }

    .card {
      width: 280px;
      height: 62px;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 14px;
      padding: 6px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.18);
      animation: pop 0.2s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes pop {
      from { transform: translateY(8px) scale(0.97); opacity: 0; }
      to   { transform: translateY(0)   scale(1);    opacity: 1; }
    }

    .title {
      font-size: 11px;
      font-weight: 600;
      color: rgba(0, 0, 0, 0.75);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .buttons {
      display: flex;
      gap: 6px;
    }

    .card {
      -webkit-app-region: no-drag;
    }

    .buttons button {
      flex: 1;
      height: 28px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 9px;
      font-weight: 600;
      transition: opacity 0.12s, transform 0.1s;
      -webkit-app-region: no-drag;
    }

    .buttons button:hover  { opacity: 0.82; }
    .buttons button:active { transform: scale(0.96); opacity: 0.65; }

    .btn-deny   { background: #D0D0D0; color: #444; flex: none; width: 42px; }
    .btn-allow  { background: #E8735A; color: #fff; flex: none; width: 42px; }
    .btn-always { background: #D45F44; color: #fff; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title" id="title">🔐 권한 요청</div>
    <div class="buttons">
      <button class="btn-deny"   data-decision="deny">거부</button>
      <button class="btn-allow"  data-decision="allow">허용</button>
      <button class="btn-always" data-decision="always" id="btn-always">항상 허용</button>
    </div>
  </div>
  <script src="permission.js"></script>
</body>
</html>
